<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Locker Router — InPost Warsaw</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --inpost-yellow: #ffcc00;
            --inpost-dark: #1a1a2e;
            --panel-bg: #16213e;
            --card-bg: #0f3460;
            --text-primary: #f0f0f0;
            --text-secondary: #a0aec0;
            --accent-green: #48bb78;
            --accent-red: #fc8181;
            --accent-blue: #63b3ed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--inpost-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Side Panel ─────────────────────────────── */
        #panel {
            width: 420px;
            min-width: 420px;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.05);
            transition: margin-left 0.3s ease;
            z-index: 1000;
        }

        #panel.collapsed { margin-left: -420px; }

        .panel-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .panel-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-header h1 .badge {
            background: var(--inpost-yellow);
            color: #000;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .panel-header p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
        }

        /* ── Selected Locker Card ──────────────────── */
        .selected-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid var(--inpost-yellow);
        }

        .selected-card .locker-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--inpost-yellow);
        }

        .selected-card .locker-address {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .selected-card .locker-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-style: italic;
        }

        /* ── Section Title ─────────────────────────── */
        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        /* ── Alternative Card ──────────────────────── */
        .alt-card {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid var(--accent-green);
            overflow: hidden;
        }

        .alt-card:hover {
            transform: translateX(4px);
            background: rgba(15, 52, 96, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .alt-card-body { padding: 14px 16px; }

        /* ── Locker photo ──────────────────────────── */
        .alt-photo {
            width: 100%;
            height: 110px;
            object-fit: cover;
            display: block;
            background: #0a1628;
        }

        .alt-photo-placeholder {
            width: 100%;
            height: 60px;
            background: linear-gradient(135deg, #0a1628 0%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.15);
        }

        /* ── Card header row ───────────────────────── */
        .alt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .alt-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .alt-time {
            background: var(--accent-green);
            color: #000;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .alt-address {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .alt-distance {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* ── Badge row ─────────────────────────────── */
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .pill {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .pill-green  { background: rgba(72,187,120,0.18); color: var(--accent-green); border: 1px solid rgba(72,187,120,0.3); }
        .pill-yellow { background: rgba(255,204,0,0.15);  color: var(--inpost-yellow); border: 1px solid rgba(255,204,0,0.3); }
        .pill-blue   { background: rgba(99,179,237,0.15); color: var(--accent-blue);  border: 1px solid rgba(99,179,237,0.3); }
        .pill-red    { background: rgba(252,129,129,0.15); color: var(--accent-red);  border: 1px solid rgba(252,129,129,0.3); }
        .pill-gray   { background: rgba(160,174,192,0.12); color: var(--text-secondary); border: 1px solid rgba(160,174,192,0.2); }

/* ── No alternatives / error ───────────────── */
        .no-alternatives {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-secondary);
        }

        .no-alternatives .icon { font-size: 2rem; margin-bottom: 8px; }

        /* ── Loading ───────────────────────────────── */
        .loading { text-align: center; padding: 40px 16px; }

        .spinner {
            width: 36px; height: 36px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--inpost-yellow);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Welcome state ─────────────────────────── */
        .welcome { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        .welcome .icon { font-size: 3rem; margin-bottom: 16px; }
        .welcome h3 { color: var(--text-primary); margin-bottom: 8px; }

        /* ── Map ───────────────────────────────────── */
        #map { flex: 1; height: 100vh; }

        /* ── Toggle ────────────────────────────────── */
        #toggle-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1001;
            background: var(--panel-bg); color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            padding: 8px 12px; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.85rem; display: none;
        }

        /* ── Stats Bar ─────────────────────────────── */
        .stats-bar {
            padding: 12px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.75rem; color: var(--text-secondary);
            display: flex; justify-content: space-between;
        }

        /* ── Leaflet popup override ────────────────── */
        .leaflet-popup-content-wrapper {
            background: var(--card-bg) !important; color: var(--text-primary) !important;
            border-radius: 10px !important; box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
        }
        .leaflet-popup-tip { background: var(--card-bg) !important; }
        .leaflet-popup-content { margin: 12px 16px !important; font-family: 'Inter', sans-serif !important; }

        .marker-cluster-small,
        .marker-cluster-medium,
        .marker-cluster-large { background-color: rgba(255,204,0,0.25) !important; }
        .marker-cluster-small div,
        .marker-cluster-medium div,
        .marker-cluster-large div {
            background-color: var(--inpost-yellow) !important; color: #000 !important;
            font-weight: 700 !important; font-family: 'Inter', sans-serif !important;
        }

        @media (max-width: 768px) {
            #panel {
                position: absolute; bottom: 0; left: 0; right: 0;
                width: 100%; min-width: 100%; height: 55vh;
                border-right: none; border-top: 1px solid rgba(255,255,255,0.1);
                border-radius: 16px 16px 0 0; transition: transform 0.3s ease;
            }
            #panel.collapsed { transform: translateY(100%); margin-left: 0; }
            #toggle-panel { display: block; }
        }
    </style>
</head>
<body>

<div id="panel">
    <div class="panel-header">
        <h1>
            Quiet Locker Router
            <span class="badge">WARSAW</span>
        </h1>
        <p>Find less crowded InPost lockers near you</p>
    </div>

    <div class="panel-content" id="panel-content">
        <div class="welcome">
            <div class="icon">📦</div>
            <h3>Select a locker on the map</h3>
            <p>Click any InPost marker to see recommended<br>low-traffic alternatives nearby.</p>
        </div>
    </div>

    <div class="stats-bar">
        <span id="stats-count">Loading lockers...</span>
        <span>InPost API + OSM Overpass</span>
    </div>
</div>

<button id="toggle-panel" onclick="togglePanel()">☰ Panel</button>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
    // ── Map Setup ──────────────────────────────────────────────────
    const map = L.map('map', { zoomControl: false }).setView([52.23, 21.01], 12);
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
    }).addTo(map);

    // ── Custom Marker Icons ────────────────────────────────────────
    function createIcon(color) {
        return L.divIcon({
            className: 'custom-marker',
            html: `<div style="width:14px;height:14px;background:${color};border:2px solid rgba(0,0,0,0.3);border-radius:50%;box-shadow:0 0 8px ${color}88;"></div>`,
            iconSize: [14, 14], iconAnchor: [7, 7],
        });
    }

    const defaultIcon  = createIcon('#ffcc00');
    const selectedIcon = createIcon('#fc8181');
    const altIcon      = createIcon('#48bb78');

    // ── State ──────────────────────────────────────────────────────
    let allMarkers    = {};
    let routeLayers   = [];
    let selectedMarker = null;

    const clusterGroup = L.markerClusterGroup({
        maxClusterRadius: 50, spiderfyOnMaxZoom: true, showCoverageOnHover: false,
    });
    map.addLayer(clusterGroup);

    // ── Load Lockers ───────────────────────────────────────────────
    async function loadLockers() {
        try {
            const resp = await fetch('/api/lockers');
            const data = await resp.json();

            data.lockers.forEach(locker => {
                const marker = L.marker([locker.lat, locker.lon], { icon: defaultIcon });
                marker.bindPopup(`
                    <strong style="color:#ffcc00;">${locker.name}</strong><br>
                    <span style="font-size:0.85rem;">${locker.address}, ${locker.city}</span><br>
                    <span style="font-size:0.8rem;color:#a0aec0;">${locker.location_description || ''}</span>
                    ${locker.is_247 ? '<br><span style="font-size:0.75rem;color:#48bb78;">⏰ Czynny 24/7</span>' : ''}
                `);
                marker.on('click', () => selectLocker(locker.name, marker));
                clusterGroup.addLayer(marker);
                allMarkers[locker.name] = marker;
            });

            document.getElementById('stats-count').textContent =
                `${data.count} lockers in Warsaw`;
        } catch (err) {
            console.error('Failed to load lockers:', err);
            document.getElementById('stats-count').textContent = 'Error loading data';
        }
    }

    // ── Select Locker ──────────────────────────────────────────────
    async function selectLocker(name, marker) {
        const panel = document.getElementById('panel-content');
        clearRoutes();
        if (selectedMarker) selectedMarker.setIcon(defaultIcon);
        marker.setIcon(selectedIcon);
        selectedMarker = marker;

        panel.innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <p>Searching for quieter alternatives...</p>
                <p style="font-size:0.75rem;color:#a0aec0;margin-top:6px;">Fetching transit data from OpenStreetMap…</p>
            </div>`;

        try {
            const resp = await fetch(`/api/alternatives/${name}`);
            const data = await resp.json();
            renderAlternatives(data);
        } catch (err) {
            panel.innerHTML = `<div class="no-alternatives"><div class="icon">⚠️</div><p>Error loading alternatives. Try again.</p></div>`;
        }
    }

    // ── Helpers ────────────────────────────────────────────────────
    const AIR_LABELS = {
        VERY_GOOD: { label: 'Powietrze: b. dobre', cls: 'pill-green' },
        GOOD:      { label: 'Powietrze: dobre',    cls: 'pill-green' },
        MODERATE:  { label: 'Powietrze: średnie',  cls: 'pill-yellow' },
        BAD:       { label: 'Powietrze: złe',      cls: 'pill-red' },
        VERY_BAD:  { label: 'Powietrze: b. złe',   cls: 'pill-red' },
    };

    function buildBadges(alt) {
        const pills = [];

        if (alt.is_247)
            pills.push(`<span class="pill pill-green">⏰ 24/7</span>`);
        else if (alt.opening_hours)
            pills.push(`<span class="pill pill-yellow">🕐 ${alt.opening_hours}</span>`);

        if (alt.location_type === 'Indoor')
            pills.push(`<span class="pill pill-blue">🏢 Indoor</span>`);
        else if (alt.location_type === 'Outdoor')
            pills.push(`<span class="pill pill-gray">🌤 Outdoor</span>`);

        if (alt.air_index_level && AIR_LABELS[alt.air_index_level]) {
            const a = AIR_LABELS[alt.air_index_level];
            pills.push(`<span class="pill ${a.cls}">💨 ${a.label}</span>`);
        }

        return pills.length ? `<div class="badge-row">${pills.join('')}</div>` : '';
    }

    // ── Render Alternatives Panel ──────────────────────────────────
    function renderAlternatives(data) {
        const panel = document.getElementById('panel-content');
        const sel   = data.selected;
        const alts  = data.alternatives;

        let html = `
            <div class="selected-card">
                <div class="locker-name">${sel.name}</div>
                <div class="locker-address">${sel.address}, ${sel.city} ${sel.post_code}</div>
                ${sel.location_description ? `<div class="locker-desc">${sel.location_description}</div>` : ''}
                <div class="badge-row" style="margin-top:8px;">
                    ${sel.is_247 ? '<span class="pill pill-green">⏰ 24/7</span>' : (sel.opening_hours ? `<span class="pill pill-yellow">🕐 ${sel.opening_hours}</span>` : '')}
                    ${sel.location_type === 'Indoor' ? '<span class="pill pill-blue">🏢 Indoor</span>' : ''}
                </div>
            </div>`;

        if (alts.length === 0) {
            html += `<div class="no-alternatives"><div class="icon">✅</div><p>${data.message || 'No alternatives within 10 min walk.'}</p></div>`;
        } else {
            html += `<div class="section-title">🟢 Quieter alternatives nearby (${alts.length})</div>`;

            alts.forEach((alt, i) => {
                const timeLabel = alt.walking_time_min ? `🚶 ${alt.walking_time_min} min` : '?';
                const distLabel = alt.walking_distance_m ? `~${alt.walking_distance_m} m pieszo` : '';
                const photo = alt.image_url
                    ? `<img class="alt-photo" src="${alt.image_url}" alt="${alt.name}" loading="lazy" onerror="this.parentElement.removeChild(this)">`
                    : `<div class="alt-photo-placeholder">📦</div>`;

                html += `
                    <div class="alt-card" onclick="focusAlternative('${alt.name}', ${i})">
                        ${photo}
                        <div class="alt-card-body">
                            <div class="alt-header">
                                <span class="alt-name">${alt.name}</span>
                                <span class="alt-time">${timeLabel}</span>
                            </div>
                            <div class="alt-address">${alt.address}${alt.city ? ', ' + alt.city : ''}</div>
                            ${distLabel ? `<div class="alt-distance">${distLabel}</div>` : ''}
                            ${buildBadges(alt)}
                        </div>
                    </div>`;

                if (alt.route_geometry) drawRoute(alt.route_geometry);
                if (allMarkers[alt.name]) allMarkers[alt.name].setIcon(altIcon);
            });
        }

        panel.innerHTML = html;
    }

    // ── Draw Route Polyline ────────────────────────────────────────
    function drawRoute(geometry) {
        const coords   = geometry.coordinates.map(c => [c[1], c[0]]);
        const polyline = L.polyline(coords, {
            color: '#48bb78', weight: 4, opacity: 0.7, dashArray: '8, 8',
        }).addTo(map);
        routeLayers.push(polyline);
    }

    // ── Clear Routes ───────────────────────────────────────────────
    function clearRoutes() {
        routeLayers.forEach(l => map.removeLayer(l));
        routeLayers = [];
        Object.values(allMarkers).forEach(m => m.setIcon(defaultIcon));
    }

    // ── Focus on Alternative ───────────────────────────────────────
    function focusAlternative(name) {
        const marker = allMarkers[name];
        if (marker) { map.setView(marker.getLatLng(), 16); marker.openPopup(); }
    }

    function togglePanel() {
        document.getElementById('panel').classList.toggle('collapsed');
    }

    loadLockers();
</script>
</body>
</html>
